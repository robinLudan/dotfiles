# --- Prefix & Shell ---
unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

set-option -g default-shell /usr/bin/zsh

# --- Terminal & Display ---
# Enable true color and advanced styling support
set -g default-terminal "tmux-256color"
set -g set-clipboard on  # Use system clipboard

# Terminal override options for modern terminals
set -as terminal-overrides ',*:Tc'     # True color
set -as terminal-overrides ',*:RGB'    # True color (alternate)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # Undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # Underscore colors

# --- Environment Variables (Wayland/niri) ---
# Preserve Wayland and desktop environment variables for proper detection
# This ensures tools like fastfetch correctly identify niri instead of xwayland-satellite
set -ga update-environment "WAYLAND_SOCKET"
set -ga update-environment "XDG_CURRENT_DESKTOP"
set -ga update-environment "DESKTOP_SESSION"
set -ga update-environment "NIRI_SOCKET"

# --- Window & Pane Behavior ---
set -g base-index 1              # Start windows at 1
set -g detach-on-destroy off     # Don't exit tmux when closing session
set -g escape-time 0             # Faster key response
set -g mouse on                  # Mouse support

# --- Resize Panes (Vim-style) ---
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# --- Zoom Pane ---
bind -r m resize-pane -Z

# --- Window Navigation ---
bind -n M-H previous-window
bind -n M-L next-window

# --- Split Windows (Keep working directory) ---
bind '-' split-window -v -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"

# --- Quick Session Creation ---
bind-key -r f run-shell "tmux neww $HOME/.config/tmux/tmux-sessionizer.sh"

# --- Reload Config ---
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# --- Copy Mode (Vi mode) ---
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

# --- Plugins ---
# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Theme
set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative
set -g @tokyo-night-tmux_window_id_style dsquare
set -g @tokyo-night-tmux_show_git 0

# Vim integration
set -g @plugin 'christoomey/vim-tmux-navigator'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-boot 'on'
set -g @continuum-restore 'on'  # Fixed typo: was 'retore'

# --- Initialize TPM ---
run '~/.tmux/plugins/tpm/tpm'
